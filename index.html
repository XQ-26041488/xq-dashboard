<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XQ 達人成效彙整表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f5f6fa; color: #333; }

  header { background: #1a1a2e; color: #fff; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { font-size: 13px; color: #aaa; margin-left: auto; }

  .toolbar { padding: 16px 32px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; background: #fff; border-bottom: 1px solid #e0e0e0; }
  .toolbar input { padding: 7px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 220px; }
  .filter-btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 20px; background: #fff; font-size: 13px; cursor: pointer; transition: all .15s; }
  .filter-btn:hover, .filter-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .count { margin-left: auto; font-size: 13px; color: #888; }
  .label { font-size: 12px; color: #999; padding: 0 2px; }
  .divider { width: 1px; background: #e0e0e0; height: 20px; margin: 0 4px; }

  .table-wrap { overflow-x: auto; padding: 24px 32px; scrollbar-width: thin; }
  .table-wrap::-webkit-scrollbar { height: 8px; }
  .table-wrap::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
  .table-wrap::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: #888; }
  table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 14px; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  th { background: #1a1a2e; color: #fff; padding: 9px 12px; text-align: left; font-weight: 500; white-space: nowrap; position: sticky; top: 0; cursor: pointer; user-select: none; }
  th:hover { background: #2d2d4e; }
  th .sort-icon { margin-left: 4px; opacity: .4; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; }
  td { padding: 7px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9ff; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .badge-active   { background: #e6f4ea; color: #2e7d32; }
  .badge-employee { background: #e8f0fe; color: #1565c0; }
  .badge-broker   { background: #fff3e0; color: #e65100; }
  .badge-ended    { background: #fce4ec; color: #b71c1c; }

  .trend-up   { color: #2e7d32; font-weight: 600; }
  .trend-flat { color: #888; }
  .trend-down { color: #c62828; font-weight: 600; }

  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .zero { color: #bbb; }
  .dash { color: #ccc; }

  .tag-講師 { background: #ede7f6; color: #4527a0; display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; }
  .tag-達人  { background: #e0f2f1; color: #00695c; display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; }
  .tag-券商  { background: #fff8e1; color: #f57f17; display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; }
  .tag-kol   { background: #fce4ec; color: #880e4f; display: inline-block; padding: 1px 5px; border-radius: 10px; font-size: 10px; margin-left: 3px; vertical-align: middle; }

  .col-name { min-width: 80px; }
  .col-real  { min-width: 90px; color: #777; font-size: 12px; }
  .no-data   { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }
  .export-btn { margin-left: auto; padding: 6px 16px; background: #2e7d32; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .export-btn:hover { background: #1b5e20; }
</style>
<style id="view-style"></style>
</head>
<body>

<header>
  <h1>XQ 達人成效彙整表</h1>
  <span id="updated">共 <b id="total-count">0</b> 筆</span>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="搜尋稱呼 / 姓名 / 優惠碼…" oninput="render()">
  <span class="divider"></span>
  <span class="label">狀態</span>
  <button class="filter-btn status-btn active" data-filter="all"    onclick="setStatus(this)">全部</button>
  <button class="filter-btn status-btn"        data-filter="合作中"  onclick="setStatus(this)">合作中</button>
  <button class="filter-btn status-btn"        data-filter="公司員工" onclick="setStatus(this)">公司員工</button>
  <button class="filter-btn status-btn"        data-filter="合作券商" onclick="setStatus(this)">合作券商</button>
  <button class="filter-btn status-btn"        data-filter="合作終止" onclick="setStatus(this)">合作終止</button>
  <span class="divider"></span>
  <span class="label">身分</span>
  <button class="filter-btn type-btn active" data-type="all"    onclick="setType(this)">全部</button>
  <button class="filter-btn type-btn"        data-type="達人講師" onclick="setType(this)">達人講師</button>
  <button class="filter-btn type-btn"        data-type="KOL合作" onclick="setType(this)">KOL合作</button>
  <button class="filter-btn type-btn"        data-type="達人"    onclick="setType(this)">達人</button>
  <button class="filter-btn type-btn"        data-type="券商"    onclick="setType(this)">券商</button>
  <span class="divider"></span>
  <span class="label">檢視</span>
  <button class="filter-btn view-btn active" data-view="all"   onclick="setView(this)">全部</button>
  <button class="filter-btn view-btn"        data-view="order" onclick="setView(this)">訂單狀況</button>
  <button class="filter-btn view-btn"        data-view="promo" onclick="setView(this)">優惠碼狀況</button>
  <span class="count" id="row-count"></span>
  <button class="export-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
</div>

<div class="table-wrap">
<table id="main-table">
  <thead>
    <tr>
      <th onclick="sortBy('稱呼')">稱呼 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('狀態')">狀態 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('合作身分')">身分 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('優惠碼')">優惠碼 <span class="sort-icon">⇅</span></th>
      <th class="col-order num" onclick="sortBy('訂單_上月(5月)')">訂單_上月(5月) <span class="sort-icon">⇅</span></th>
      <th class="col-order num" onclick="sortBy('訂單_當月(6月)')">訂單_當月(6月) <span class="sort-icon">⇅</span></th>
      <th class="col-order" onclick="sortBy('訂單趨勢(月比月)')">訂單趨勢 <span class="sort-icon">⇅</span></th>
      <th class="col-promo num" onclick="sortBy('優惠碼累計綁定人數')">優惠碼(累計) <span class="sort-icon">⇅</span></th>
      <th class="col-promo num" onclick="sortBy('優惠碼新增_上月(5月)')">優惠碼新增_上月(5月) <span class="sort-icon">⇅</span></th>
      <th class="col-promo num" onclick="sortBy('優惠碼新增_當月(6月)')">優惠碼新增_當月(6月) <span class="sort-icon">⇅</span></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

let currentFilter = 'all';
let currentType   = 'all';
let sortKey = '';
let sortAsc = true;

function setStatus(btn) {
  document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
}

function setType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
  render();
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  event.currentTarget.classList.add('sorted');
  event.currentTarget.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
  render();
}

function numVal(v) {
  const n = parseInt(v);
  return isNaN(n) ? -1 : n;
}

function filtered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let rows = RAW.slice();
  if (currentFilter !== 'all') rows = rows.filter(r => r['狀態'] === currentFilter);
  if (currentType !== 'all')   rows = rows.filter(r => r['合作身分'] === currentType || r['合作身分2'] === currentType);
  if (q) rows = rows.filter(r =>
    (r['稱呼']||'').toLowerCase().includes(q) ||
    (r['真實姓名']||'').toLowerCase().includes(q) ||
    (r['優惠碼']||'').toLowerCase().includes(q)
  );
  if (sortKey) {
    rows.sort((a, b) => {
      let va = a[sortKey] || '', vb = b[sortKey] || '';
      const na = numVal(va), nb = numVal(vb);
      if (na >= 0 && nb >= 0) return sortAsc ? na - nb : nb - na;
      return sortAsc ? va.localeCompare(vb, 'zh-TW') : vb.localeCompare(va, 'zh-TW');
    });
  }
  return rows;
}

function badgeStatus(s) {
  const map = { '合作中':'badge-active','公司員工':'badge-employee','合作券商':'badge-broker','合作終止':'badge-ended' };
  return `<span class="badge ${map[s]||''}">${s}</span>`;
}
function tagType(t) {
  if (!t) return '';
  if (t.includes('講師')) return `<span class="tag-講師">${t}</span>`;
  if (t === 'KOL合作')   return `<span class="tag-kol">KOL</span>`;
  if (t.includes('達人')) return `<span class="tag-達人">${t}</span>`;
  if (t.includes('券商')) return `<span class="tag-券商">${t}</span>`;
  return t;
}
function trendClass(v) {
  if (v.includes('↑')) return 'trend-up';
  if (v.includes('↓')) return 'trend-down';
  return 'trend-flat';
}
function fmtNum(v) {
  if (!v || v === '-' || v === 'nan') return '<span class="dash">—</span>';
  const n = parseInt(v);
  if (isNaN(n)) return v;
  if (n === 0)  return '<span class="zero">0</span>';
  return n.toLocaleString();
}

function setView(btn) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const v = btn.dataset.view;
  const style = document.getElementById('view-style');
  if (v === 'order') style.textContent = '.col-promo { display:none; }';
  else if (v === 'promo') style.textContent = '.col-order { display:none; }';
  else style.textContent = '';
}

function exportCSV() {
  const rows = filtered();
  if (!rows.length) { alert('沒有可匯出的資料'); return; }
  const cols = Object.keys(RAW[0]);
  const escape = v => '"' + String(v ?? '').replace(/"/g, '""') + '"';
  const header = cols.map(escape).join(',');
  const body   = rows.map(r => cols.map(c => escape(r[c] ?? '')).join(',')).join('\n');
  const blob   = new Blob(['\uFEFF' + header + '\n' + body], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  const q = document.getElementById('search').value.trim();
  const fname = q ? `XQ達人成效_${q}.csv` : 'XQ達人成效_全部.csv';
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
}

function render() {
  const rows = filtered();
  document.getElementById('row-count').textContent = `顯示 ${rows.length} 筆`;
  document.getElementById('total-count').textContent = rows.length;
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="no-data">沒有符合的資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="col-name"><b>${r['稱呼']||''}</b><br><span style="font-size:11px;color:#999;font-weight:normal">${r['真實姓名']||''}</span></td>
      <td>${badgeStatus(r['狀態']||'')}</td>
      <td>${tagType(r['合作身分']||'')}${r['合作身分2'] ? tagType(r['合作身分2']) : ''}</td>
      <td style="color:#555;font-size:12px">${r['優惠碼']||'—'}</td>
      <td class="col-order num">${fmtNum(r['訂單_上月(5月)'])}</td>
      <td class="col-order num">${fmtNum(r['訂單_當月(6月)'])}</td>
      <td class="col-order ${trendClass(r['訂單趨勢(月比月)']||'')}">${r['訂單趨勢(月比月)']||'—'}</td>
      <td class="col-promo num">${fmtNum(r['優惠碼累計綁定人數'])}</td>
      <td class="col-promo num">${fmtNum(r['優惠碼新增_上月(5月)'])}</td>
      <td class="col-promo num">${fmtNum(r['優惠碼新增_當月(6月)'])}</td>
    </tr>`).join('');
}

render();
